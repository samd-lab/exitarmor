<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- iOS/Android home-screen icon: solid ink tile + centered mark -->
  <defs>
    <linearGradient id="tileBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2236"/>
      <stop offset="1" stop-color="#050812"/>
    </linearGradient>
    <linearGradient id="tileShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3650"/>
      <stop offset="1" stop-color="#0b0f1c"/>
    </linearGradient>
    <linearGradient id="tileChevron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="tileHalo" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#e63946" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="180" height="180" rx="38" fill="url(#tileBg)"/>
  <rect width="180" height="180" rx="38" fill="url(#tileHalo)"/>

  <!-- Shield -->
  <g transform="translate(40 30)">
    <path d="M50 0 L96 14 V50 C96 70 76 90 50 104 C24 90 4 70 4 50 V14 Z"
          fill="url(#tileShield)" stroke="#e63946" stroke-width="3"/>
    <path d="M50 6 L90 18.5 V50 C90 67.5 72 86 50 98 C28 86 10 67.5 10 50 V18.5 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.2"/>
    <path d="M18 72 L50 32 L82 72"
          fill="none" stroke="url(#tileChevron)" stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="19" r="4.6" fill="#e63946"/>
  </g>
</svg>
