<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Exit Armor standalone mark — used in sidebar, nav, PDF header -->
  <defs>
    <linearGradient id="mkShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2a44"/>
      <stop offset="1" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="mkChevron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="mkGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M32 4 L56 12 V32 C56 44 45 54 32 60 C19 54 8 44 8 32 V12 Z"
        fill="url(#mkShield)" stroke="#e63946" stroke-width="2.2"/>

  <!-- Inner rim — subtle editorial detail -->
  <path d="M32 8 L52 14.6 V32 C52 42.2 42.8 51 32 56 C21.2 51 12 42.2 12 32 V14.6 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.8"/>

  <!-- Amber ascent chevron (exit/ascend) -->
  <path d="M16 42 L32 22 L48 42"
        fill="none" stroke="url(#mkChevron)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#mkGlow)"/>

  <!-- Ignition dot -->
  <circle cx="32" cy="15" r="2.8" fill="#e63946"/>
</svg>
